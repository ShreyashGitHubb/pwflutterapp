name: flowmind_ai
description: Predictive Crowd Flow AI for PulseStadium.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_vertexai: ^0.2.0
  google_maps_flutter: ^2.5.3
  flutter_riverpod: ^2.4.9
  google_fonts: ^6.1.0
  geolocator: ^10.1.0
  http: ^1.1.0
  intl: ^0.19.0
  vibration: ^1.8.4
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
